services:
  mysql:
    image: mysql:8.4.8
    container_name: efrei-projet-fil-rouge-cicd-mysql-stg
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: registry.spokayhub.top/efrei-pipelinesfinal-backend:${IMAGE_TAG:-latest}
    container_name: efrei-pipelinesfinal-backend-stg
    env_file:
      - ./bx37-backend-stg.env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/techniciens"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mysql_data: